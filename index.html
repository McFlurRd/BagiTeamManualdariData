<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fun Basket - Pro Team Builder (Mobile Ready)</title>
    <style>
        :root {
            --primary: #c40000;
            --accent: #ffb199;
            --bg-dark: #121212;
            --card-bg: rgba(255, 255, 255, 0.1);
            --drag-over: rgba(33, 150, 243, 0.3);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-dark); 
            color: #eee;
            touch-action: manipulation; /* Optimasi touch */
        }
        
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .section { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }
        .hidden { display: none !important; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--accent); }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 16px; }
        
        button { background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; margin-top: 20px; font-size: 16px; }
        button:hover { background: #ff0000; }
        .btn-secondary { background: #444; }

        #syncStatus { font-size: 14px; margin-bottom: 10px; font-weight: bold; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); }

        /* Drafting Layout */
        .draft-layout { display: flex; gap: 20px; margin-top: 20px; align-items: flex-start; flex-wrap: wrap; }
        .pool-sidebar { width: 300px; background: #252525; padding: 20px; border-radius: 10px; height: 85vh; overflow-y: auto; }
        
        .player-chip { 
            padding: 10px; 
            background: #333; 
            border-radius: 8px; 
            margin-bottom: 8px; 
            cursor: grab; 
            border: 1px solid #444; 
            font-size: 14px;
            user-select: none;
            touch-action: none; /* Penting untuk drag manual */
        }
        
        .teams-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .team-card { background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .team-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 10px; }
        .team-score { font-size: 12px; color: var(--accent); font-weight: bold; }

        /* Slot Styles */
        .slot { 
            min-height: 55px; 
            background: rgba(0,0,0,0.2); 
            border-radius: 8px; 
            margin-bottom: 8px; 
            padding: 5px 10px; 
            border: 1px dashed #555; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            transition: 0.2s;
        }
        .slot.drag-over { background: var(--drag-over); border-color: #2196F3; }
        .pos-label { font-weight: bold; color: #777; width: 30px; }
        .p-info { flex: 1; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }
        .p-name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        .p-meta { font-size: 10px; opacity: 0.7; }
        .badge { padding: 1px 4px; border-radius: 3px; background: #444; margin-right: 3px; }
        .badge-skill { background: var(--primary); }

        /* Final Result */
        .final-page { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; 
            background-attachment: fixed; 
            min-height: 100vh; 
            padding: 40px 10px; 
        }
        .header-final { text-align: center; margin-bottom: 40px; }
        .final-slot { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 0; display: flex; align-items: center; justify-content: space-between; font-size: 14px; }
        .actions-final { display: flex; gap: 10px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }

        @media (max-width: 768px) {
            .pool-sidebar { width: 100%; height: 250px; position: relative; top: 0; margin-bottom: 20px; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>

    <div id="step1" class="container">
        <div class="section">
            <h1>🏀 Pro Team Builder</h1>
            <div id="syncStatus">⏳ Menghubungkan ke Cloud...</div>
            
            <label>📍 Lokasi:</label>
            <input type="text" id="lapangan" value="METRO PUSPOWARNO B">
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <div style="flex: 2; min-width: 150px;"><label>📅 Tanggal:</label><input type="date" id="tanggal"></div>
                <div style="flex: 1; min-width: 80px;"><label>⏰ Mulai:</label><input type="time" id="jamMulai"></div>
                <div style="flex: 1; min-width: 80px;"><label>⏰ Selesai:</label><input type="time" id="jamSelesai"></div>
            </div>

            <label>👥 List 25 Nama Panggilan:</label>
            <textarea id="playerInput" rows="10" placeholder="1. Nama&#10;2. Nama..."></textarea>
            
            <button onclick="goToSetup()">Lanjut: Verifikasi Data</button>
        </div>
    </div>

    <div id="step2" class="container hidden">
        <div class="section">
            <h2>Detail Pemain</h2>
            <div style="overflow-x: auto;">
                <table style="width:100%; border-collapse: collapse;">
                    <thead><tr style="text-align: left; color: var(--accent);"><th>Nama</th><th>P1</th><th>P2</th><th>Skill</th></tr></thead>
                    <tbody id="setupTable"></tbody>
                </table>
            </div>
            <button onclick="startDrafting()">Lanjut ke Pembagian Tim</button>
            <button class="btn-secondary" onclick="backToStep1()">Kembali</button>
        </div>
    </div>

    <div id="step3" class="container hidden" style="max-width: 1400px;">
        <div class="draft-layout">
            <div class="pool-sidebar">
                <h3>Draft Pool (<span id="remCount">25</span>)</h3>
                <div id="poolGrid"></div>
            </div>
            <div style="flex: 1;">
                <div id="teamsArea" class="teams-grid"></div>
                <button onclick="showFinalResult()" style="background: #4CAF50;">LIHAT HASIL AKHIR</button>
                <button class="btn-secondary" onclick="backToStep2()">Edit Skill</button>
            </div>
        </div>
    </div>

    <div id="step4" class="final-page hidden">
        <div class="header-final">
            <h2 style="color:#ccc; margin:0;">Fun Basketball Semarang</h2>
            <h1 id="resLapangan" style="font-size: 2.5rem; color: var(--accent); margin: 0;"></h1>
            <p id="resWaktu" style="font-size: 1.1rem;"></p>
            <p style="font-size: 0.8rem; opacity: 0.6;">💡 Drag & drop pemain untuk tukar posisi</p>
        </div>
        <div id="teamsOutput" class="container" style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;"></div>
        
        <div class="actions-final">
            <button onclick="backToEdit()" style="width:auto; padding: 15px 40px; background: #2196F3;">Edit Draft Lagi</button>
            <button onclick="location.reload()" class="btn-secondary" style="width:auto; padding: 15px 40px;">Reset Semua</button>
        </div>
    </div>

    <script>
        const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxPJmwL0FHSDPPbMDifF6fc7GsqnrxzTR4DwdH8T6rhIDVwB4e77NjPaSrNWJ-xZWZxtA/exec";

        let dbPemain = [];
        let players = [];
        const positions = ["PG", "SG", "SF", "PF", "C"];
        const teamKeys = ["A", "B", "C", "D", "E"];
        const skillMap = { "Pro": 4, "Advanced": 3, "Intermediate": 2, "Beginner": 1 };
        let draftData = {};

        // Variables for Mobile Touch
        let activeTouchElement = null;
        let ghostElement = null;
        let touchData = {};

        async function fetchDatabase() {
            const status = document.getElementById("syncStatus");
            try {
                const response = await fetch(SHEET_API_URL);
                dbPemain = await response.json();
                status.innerText = "✅ Database Terhubung: " + dbPemain.length + " Pemain";
                status.style.color = "#4CAF50";
            } catch (e) {
                status.innerText = "⚠️ Mode Manual Aktif";
                status.style.color = "#ffb199";
            }
        }
        window.onload = fetchDatabase;

        function goToSetup() {
            const input = document.getElementById("playerInput").value.trim();
            if (!input) return alert("Masukkan nama!");
            const names = input.split("\n").map(n => n.replace(/^[0-9]+[\.\s\-]+/, '').trim()).filter(n => n !== "");
            if (names.length !== 25) return alert("Harus 25 nama!");

            let html = "";
            names.forEach((name, i) => {
                const match = dbPemain.find(db => db.panggilan?.toLowerCase().trim() === name.toLowerCase().trim());
                const defP1 = match?.p1 || "PG";
                const defP2 = match?.p2 || "SG";
                const defSk = match?.skill || "Intermediate";

                html += `<tr>
                    <td><b>${name}</b></td>
                    <td><select id="p1-${i}">${positions.map(p => `<option ${p==defP1?'selected':''}>${p}</option>`).join("")}</select></td>
                    <td><select id="p2-${i}">${positions.map(p => `<option ${p==defP2?'selected':''}>${p}</option>`).join("")}</select></td>
                    <td><select id="sk-${i}">
                        <option ${defSk=='Beginner'?'selected':''}>Beginner</option>
                        <option ${defSk=='Intermediate'?'selected':''}>Intermediate</option>
                        <option ${defSk=='Advanced'?'selected':''}>Advanced</option>
                        <option ${defSk=='Pro'?'selected':''}>Pro</option>
                    </select></td>
                </tr>`;
            });
            document.getElementById("setupTable").innerHTML = html;
            document.getElementById("step1").classList.add("hidden");
            document.getElementById("step2").classList.remove("hidden");
            players = names.map((n, i) => ({ id: i, name: n }));
        }

        function startDrafting() {
            players = players.map((p, i) => ({
                ...p,
                p1: document.getElementById(`p1-${i}`).value,
                p2: document.getElementById(`p2-${i}`).value,
                skill: document.getElementById(`sk-${i}`).value,
                val: skillMap[document.getElementById(`sk-${i}`).value],
                assigned: false
            }));
            
            if (Object.keys(draftData).length === 0) {
                teamKeys.forEach(t => {
                    draftData[t] = {};
                    positions.forEach(pos => draftData[t][pos] = null);
                });
            }
            renderAll();
            document.getElementById("step2").classList.add("hidden");
            document.getElementById("step3").classList.remove("hidden");
        }

        function renderAll() {
            renderPool();
            renderDraftBoards();
        }

        function renderPool() {
            const grid = document.getElementById("poolGrid");
            grid.innerHTML = "";
            let rem = 0;
            players.forEach(p => {
                if (!p.assigned) {
                    rem++;
                    const div = document.createElement("div");
                    div.className = "player-chip";
                    div.draggable = true;
                    div.innerHTML = `<b>${p.name}</b> <div style="font-size:9px; opacity:0.7">${p.p1}/${p.p2} | ${p.skill}</div>`;
                    
                    // Desktop
                    div.ondragstart = (e) => e.dataTransfer.setData("playerId", p.id);
                    // Mobile
                    div.addEventListener('touchstart', (e) => handleTouchStart(e, {playerId: p.id}), {passive: false});
                    div.addEventListener('touchmove', handleTouchMove, {passive: false});
                    div.addEventListener('touchend', handleTouchEnd, {passive: false});
                    
                    grid.appendChild(div);
                }
            });
            document.getElementById("remCount").innerText = rem;
        }

        function renderDraftBoards() {
            const area = document.getElementById("teamsArea");
            area.innerHTML = "";
            teamKeys.forEach(t => {
                let totalSkill = 0;
                const card = document.createElement("div");
                card.className = "team-card";
                const slotsHtml = positions.map(pos => {
                    const p = draftData[t][pos];
                    if (p) totalSkill += p.val;
                    return `<div class="slot" data-team="${t}" data-pos="${pos}" ondragover="event.preventDefault(); this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event, '${t}', '${pos}')">
                        <span class="pos-label">${pos}</span>
                        <div class="p-info" ${p ? `draggable="true" ondragstart="handleMoveStart(event, '${t}', '${pos}')"` : ''}>
                            ${p ? `<span class="p-name">${p.name}</span><div class="p-meta"><span class="badge">${p.p1}/${p.p2}</span><span class="badge badge-skill">${p.skill}</span></div>` : '<span style="color:#444; font-size:12px;">Kosong</span>'}
                        </div>
                        ${p ? `<span style="cursor:pointer; color:red; padding:5px;" onclick="removePlayer('${t}','${pos}')">×</span>` : ''}
                    </div>`;
                }).join("");
                card.innerHTML = `<div class="team-header"><h3 style="margin:0">TEAM ${t}</h3><span class="team-score">Power: ${totalSkill}</span></div>${slotsHtml}`;
                area.appendChild(card);
            });
            attachTouchToSlots();
        }

        function attachTouchToSlots() {
            document.querySelectorAll('.slot, .final-slot').forEach(slot => {
                const team = slot.getAttribute('data-team');
                const pos = slot.getAttribute('data-pos');
                const pInfo = slot.querySelector('.p-info');
                if(pInfo && draftData[team][pos]) {
                    pInfo.addEventListener('touchstart', (e) => handleTouchStart(e, {fromTeam: team, fromPos: pos}), {passive: false});
                    pInfo.addEventListener('touchmove', handleTouchMove, {passive: false});
                    pInfo.addEventListener('touchend', handleTouchEnd, {passive: false});
                }
            });
        }

        // Core Logic Move
        function executeMove(data) {
            const { pId, fromTeam, fromPos, toTeam, toPos } = data;
            let incoming;
            if (pId !== undefined) incoming = players.find(p => p.id == pId);
            else if (fromTeam) incoming = draftData[fromTeam][fromPos];

            if (!incoming || !toTeam || !toPos) return;

            const targetExist = draftData[toTeam][toPos];

            if (fromTeam) {
                draftData[fromTeam][fromPos] = targetExist;
                draftData[toTeam][toPos] = incoming;
            } else {
                if (targetExist) players.find(p => p.id == targetExist.id).assigned = false;
                draftData[toTeam][toPos] = incoming;
                players.find(p => p.id == incoming.id).assigned = true;
            }

            if (!document.getElementById("step3").classList.contains("hidden")) renderAll();
            else showFinalResult();
        }

        // Desktop Handlers
        function handleDrop(e, toTeam, toPos) {
            e.preventDefault();
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
            const pId = e.dataTransfer.getData("playerId");
            const fromTeam = e.dataTransfer.getData("fromTeam");
            const fromPos = e.dataTransfer.getData("fromPos");
            executeMove({ pId: pId===""?undefined:pId, fromTeam, fromPos, toTeam, toPos });
        }
        function handleMoveStart(e, team, pos) {
            e.dataTransfer.setData("fromTeam", team);
            e.dataTransfer.setData("fromPos", pos);
        }

        // Touch Handlers (The Bridge)
        function handleTouchStart(e, data) {
            activeTouchElement = e.currentTarget;
            touchData = data;
            ghostElement = activeTouchElement.cloneNode(true);
            ghostElement.style.position = "fixed";
            ghostElement.style.width = activeTouchElement.offsetWidth + "px";
            ghostElement.style.opacity = "0.8";
            ghostElement.style.pointerEvents = "none";
            ghostElement.style.zIndex = "1000";
            ghostElement.style.left = e.touches[0].clientX - (activeTouchElement.offsetWidth/2) + "px";
            ghostElement.style.top = e.touches[0].clientY - 20 + "px";
            document.body.appendChild(ghostElement);
        }

        function handleTouchMove(e) {
            if (!ghostElement) return;
            e.preventDefault();
            ghostElement.style.left = e.touches[0].clientX - (ghostElement.offsetWidth/2) + "px";
            ghostElement.style.top = e.touches[0].clientY - 20 + "px";
            
            const target = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
            const slot = target?.closest('.slot, .final-slot');
            document.querySelectorAll('.slot, .final-slot').forEach(s => s.classList.remove('drag-over'));
            if(slot) slot.classList.add('drag-over');
        }

        function handleTouchEnd(e) {
            if (!ghostElement) return;
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const slot = target?.closest('.slot, .final-slot');
            
            if (slot) {
                executeMove({ ...touchData, toTeam: slot.dataset.team, toPos: slot.dataset.pos });
            }
            
            document.body.removeChild(ghostElement);
            ghostElement = null;
            document.querySelectorAll('.slot, .final-slot').forEach(s => s.classList.remove('drag-over'));
        }

        function removePlayer(team, pos) {
            const p = draftData[team][pos];
            if (p) {
                players.find(pl => pl.id == p.id).assigned = false;
                draftData[team][pos] = null;
                renderAll();
            }
        }

        function showFinalResult() {
            document.getElementById("resLapangan").innerText = document.getElementById("lapangan").value;
            const tgl = document.getElementById("tanggal").value;
            if(tgl) {
                const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
                const time = `${document.getElementById("jamMulai").value} - ${document.getElementById("jamSelesai").value}`;
                document.getElementById("resWaktu").innerText = `${new Date(tgl).toLocaleDateString('id-ID', options)} | ${time}`;
            }

            const out = document.getElementById("teamsOutput");
            out.innerHTML = "";
            teamKeys.forEach(t => {
                let skill = 0;
                let listHtml = positions.map(pos => {
                    const p = draftData[t][pos];
                    if(p) skill += p.val;
                    return `<div class="final-slot" data-team="${t}" data-pos="${pos}" ondragover="event.preventDefault();" ondrop="handleDrop(event, '${t}', '${pos}')">
                        <span style="background:#333; padding:2px 6px; border-radius:4px; font-weight:bold; font-size:11px; width:25px; text-align:center;">${pos}</span>
                        <div class="p-info" style="flex:1; display:flex; justify-content:space-between; align-items:center; margin-left:10px;" ${p? 'draggable="true" ondragstart="handleMoveStart(event, \''+t+'\', \''+pos+'\')"' : ''}>
                            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${p ? p.name : '-'}</span>
                            <span style="color:var(--accent); font-size:10px; font-weight:bold;">${p ? p.skill : ''}</span>
                        </div>
                    </div>`;
                }).join("");

                out.innerHTML += `<div style="background:var(--card-bg); backdrop-filter:blur(10px); padding:20px; border-radius:20px; width:260px; border:1px solid rgba(255,255,255,0.1);">
                    <div style="display:flex; justify-content:space-between; border-bottom:2px solid var(--accent); padding-bottom:8px; margin-bottom:10px;">
                        <h3 style="margin:0; color:var(--accent);">TEAM ${t}</h3>
                        <span style="font-size:12px; opacity:0.6;">Power: ${skill}</span>
                    </div>
                    ${listHtml}
                </div>`;
            });
            attachTouchToSlots();
            document.getElementById("step3").classList.add("hidden");
            document.getElementById("step4").classList.remove("hidden");
            window.scrollTo(0,0);
        }

        function backToEdit() { document.getElementById("step4").classList.add("hidden"); document.getElementById("step3").classList.remove("hidden"); renderAll(); }
        function backToStep2() { document.getElementById("step3").classList.add("hidden"); document.getElementById("step2").classList.remove("hidden"); }
        function backToStep1() { document.getElementById("step2").classList.add("hidden"); document.getElementById("step1").classList.remove("hidden"); }
    </script>
</body>
</html>
